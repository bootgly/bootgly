; ----------------------------------------------------------------------------
; Bootgly PHP runtime tuning (opcache + JIT)
;
; Bootgly runs as a long-lived CLI process (HTTP/TCP/UDP servers with forked
; workers), so opcache MUST be enabled for the CLI SAPI. JIT adds ~50% on hot
; paths per the Bootgly README. Loaded as conf.d/zz-* so it wins over defaults.
; Override any value at runtime with `-d`, e.g. `docker run ... php -d memory_limit=512M`.
; ----------------------------------------------------------------------------

; * Opcache
opcache.enable=1
opcache.enable_cli=1
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=50000

; * JIT (tracing) — requires opcache enabled + a non-zero buffer
opcache.jit=tracing
opcache.jit_buffer_size=256M

; * Runtime limits
memory_limit=256M
realpath_cache_size=4096K
realpath_cache_ttl=600

; * Errors — quiet by default for a server image (enable when debugging)
display_errors=Off
log_errors=On
