name: Bootgly (test)

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**/README.md'

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      -
        name: Checkout code
        uses: actions/checkout@v5

      -
        name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          ini-file: 'development'
          ini-values: disable_functions=""
          extensions: mbstring, pcntl
      -
        name: Run Bootgly Test command
        env:
          BOOTGLY_TEST_TRACE: 1
        run: |
          php bootgly
          set +e
          timeout --signal=TERM --kill-after=30 300 php bootgly test --bootgly
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            echo '::error::bootgly test stalled (300s timeout) — dumping processes and listeners'
            ps auxf || true
            ss -tlnp || true
          fi
          exit "$code"
      -
        name: Dump benchmark run artifacts
        if: failure()
        run: |
          find storage/tests/benchmarks -type f 2>/dev/null | while read -r file; do
            echo "===== $file"
            cat -v "$file" || true
            echo
          done