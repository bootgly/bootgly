name: Docker (build + push)

# Publishes bootgly/bootgly (slim + full) to Docker Hub on every published
# release. The Dockerfile lives at the repo root but builds with the WORKSPACE
# as context (the `full` target COPYs the sibling bootgly_benchmarks/), so this
# job checks out both repos side by side and builds from their parent.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (e.g. 0.17.2-beta). Required on manual dispatch.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout bootgly (framework)
        uses: actions/checkout@v5
        with:
          path: bootgly

      - name: Checkout bootgly_benchmarks (full target needs the sibling)
        uses: actions/checkout@v5
        with:
          repository: bootgly/bootgly_benchmarks
          path: bootgly_benchmarks

      - name: Resolve source provenance
        id: source
        run: |
          echo "framework_sha=$(git -C bootgly rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "benchmarks_sha=$(git -C bootgly_benchmarks rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          if [ -n "$(git -C bootgly status --porcelain=v1 --untracked-files=normal --ignore-submodules=none)" ]; then
            echo "framework_dirty=true" >> "$GITHUB_OUTPUT"
          else
            echo "framework_dirty=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$(git -C bootgly_benchmarks status --porcelain=v1 --untracked-files=normal --ignore-submodules=none)" ]; then
            echo "benchmarks_dirty=true" >> "$GITHUB_OUTPUT"
          else
            echo "benchmarks_dirty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: version
        run: |
          V="${{ github.event.release.tag_name || inputs.version }}"
          V="${V#v}"
          if [ -z "$V" ]; then
            echo "::error::No version resolved (provide the 'version' input on manual dispatch)."
            exit 1
          fi
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push slim
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bootgly/Dockerfile
          target: slim
          platforms: linux/amd64
          push: true
          build-args: |
            BOOTGLY_VERSION=${{ steps.version.outputs.value }}
            BOOTGLY_FRAMEWORK_SHA=${{ steps.source.outputs.framework_sha }}
            BOOTGLY_FRAMEWORK_DIRTY=${{ steps.source.outputs.framework_dirty }}
          tags: |
            bootgly/bootgly:slim
            bootgly/bootgly:latest

      - name: Build and push full
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bootgly/Dockerfile
          target: full
          platforms: linux/amd64
          push: true
          build-args: |
            BOOTGLY_VERSION=${{ steps.version.outputs.value }}
            BOOTGLY_FRAMEWORK_SHA=${{ steps.source.outputs.framework_sha }}
            BOOTGLY_FRAMEWORK_DIRTY=${{ steps.source.outputs.framework_dirty }}
            BOOTGLY_BENCHMARKS_SHA=${{ steps.source.outputs.benchmarks_sha }}
            BOOTGLY_BENCHMARKS_DIRTY=${{ steps.source.outputs.benchmarks_dirty }}
          tags: |
            bootgly/bootgly:full

      # The bootgly_benchmarks images bake FROM bootgly/bootgly:full — now that
      # it is on Hub, tell that repo to rebuild every opponent against it. No
      # token configured yet → warn and stay green (set BENCHMARKS_DISPATCH_TOKEN
      # to a fine-grained PAT with "contents:read" + "metadata:read" and the
      # bootgly_benchmarks "Actions: write" permission to enable auto-rebuild).
      - name: Trigger bootgly_benchmarks rebuild
        env:
          GH_TOKEN: ${{ secrets.BENCHMARKS_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::BENCHMARKS_DISPATCH_TOKEN not set — skipping bootgly_benchmarks dispatch."
            exit 0
          fi
          printf '{"event_type":"framework-release","client_payload":{"version":"%s","base":"bootgly/bootgly:full"}}' "$VERSION" > payload.json
          gh api repos/bootgly/bootgly_benchmarks/dispatches --method POST --input payload.json
